networks:
  hub:
    driver: bridge

services:
  db:
    image: postgres:16-alpine
    restart: always
    networks:
      - hub
    environment:
      POSTGRES_DB: projecthub
      POSTGRES_USER: projecthub
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # 호스트 포트 노출 안 함 (백엔드가 내부 네트워크로 접근) — 서버 기존 Postgres와 충돌 방지
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U projecthub -d projecthub"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: always
    networks:
      - hub
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    restart: on-failure
    networks:
      - hub
    environment:
      DATABASE_URL: postgresql+asyncpg://projecthub:${DB_PASSWORD}@db:5432/projecthub
      REDIS_URL: redis://redis:6379
      SECRET_KEY: ${SECRET_KEY}
      FIRST_ADMIN_EMAIL: ${FIRST_ADMIN_EMAIL}
      FIRST_ADMIN_PASSWORD: ${FIRST_ADMIN_PASSWORD}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080}
      LLM_BASE_URL: ${LLM_BASE_URL:-http://host.docker.internal:1234/v1}
      LLM_MODEL: ${LLM_MODEL:-qwen/qwen3-8b}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-opus-4-8}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - email_storage:/app/emails
      - chat_uploads:/app/uploads
      # NAS 부서 자료실 (서버 .env에 NAS_MOUNT=/mnt/works, 로컬은 빈 폴더)
      - ${NAS_MOUNT:-./nas-local}:/app/nas

  frontend:
    build: ./frontend
    restart: always
    networks:
      - hub
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    restart: always
    networks:
      - hub
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  redis_data:
  email_storage:
  chat_uploads:
